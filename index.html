<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pran 15 Puzzle Chalange</title>
  <meta name="description" content="A beautiful, responsive 15 sliding puzzle game. Rearrange the tiles in order to win!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Floating background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <header class="header">
      <h1 class="title">
        <span class="title-icon">🧩</span>
        <span>Pran 15 Puzzle Chalange</span>
      </h1>
      <p class="subtitle">Slide the tiles. Solve the puzzle.</p>
    </header>

    <main class="main">
      <!-- Stats bar -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-card">
          <div class="stat-label">Moves</div>
          <div class="stat-value" id="moveCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timer">00:00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Best</div>
          <div class="stat-value" id="bestScore">—</div>
        </div>
      </div>

      <!-- Puzzle board -->
      <div class="board-wrapper">
        <div class="board" id="board"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-primary" id="btnShuffle" aria-label="Shuffle and restart puzzle">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          <span>New Game</span>
        </button>
        <button class="btn btn-secondary" id="btnHint" aria-label="Show hint">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Hint</span>
        </button>
        <button class="btn btn-secondary" id="btnLeaderboard" aria-label="Leaderboard">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
          <span>Rankings</span>
        </button>
      </div>

      <!-- Device indicator -->
      <div class="device-indicator" id="deviceIndicator">
        <span class="device-icon" id="deviceIcon"></span>
        <span class="device-label" id="deviceLabel"></span>
      </div>
    </main>

    <!-- Start overlay -->
    <div class="win-overlay" id="startOverlay">
      <div class="win-modal">
        <h2 class="win-title">Welcome to Pran 15 Puzzle Chalange!</h2>
        <form id="scoreForm" class="auth-form" style="margin-top: 16px;">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" required placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label for="userIdName">User ID Name (Display Name)</label>
            <input type="text" id="userIdName" required placeholder="Enter display name">
          </div>
          <div id="scoreError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-large" id="btnStartGame" style="width: 100%;">Start Game</button>
        </form>
      </div>
    </div>

    <!-- Win overlay -->
    <div class="win-overlay" id="winOverlay">
      <div class="win-modal">
        <div class="win-confetti" id="confettiCanvas"></div>
        <div class="win-emoji">🎉</div>
        <h2 class="win-title">You Win!</h2>
        <div class="win-stats">
          <div class="win-stat">
            <span class="win-stat-label">Moves</span>
            <span class="win-stat-value" id="winMoves">0</span>
          </div>
          <div class="win-stat">
            <span class="win-stat-label">Time</span>
            <span class="win-stat-value" id="winTime">00:00</span>
          </div>
        </div>
        <div id="winStatus" style="margin-top: 10px; margin-bottom: 20px; font-size: 0.95rem; font-weight: 500;">Saving score...</div>
        <button class="btn btn-primary btn-large" id="btnPlayAgain" style="display: none; width: 100%;">
          <span>Play Again</span>
        </button>
      </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="win-overlay" id="leaderboardOverlay">
      <div class="win-modal leaderboard-modal">
        <button class="close-btn" id="btnCloseLeaderboard">×</button>
        
        <div class="leaderboard-tabs">
          <button class="tab-btn active" id="tabWeekly">Weekly Leaderboard</button>
          <button class="tab-btn" id="tabRecords">Top 10 Records</button>
        </div>

        <div class="leaderboard-container">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Moves</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <!-- Filled by JS -->
            </tbody>
          </table>
          <div id="leaderboardLoading" class="loading-spinner">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
